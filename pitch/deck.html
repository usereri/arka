<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arka — Pitch Deck</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #07070e;
      color: #fff;
      height: 100vh;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 75% 65% at -8% 15%, rgba(229, 0, 125, .13) 0%, transparent 55%),
        radial-gradient(ellipse 55% 65% at 108% 85%, rgba(102, 45, 145, .1) 0%, transparent 55%),
        radial-gradient(ellipse 40% 45% at 55% -5%, rgba(0, 174, 239, .07) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .deck {
      position: relative;
      z-index: 1;
      max-width: 1060px;
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 28px 80px;
    }

    .slide {
      position: relative;
      width: 100%;
      height: 560px;
      background: rgba(255, 255, 255, .03);
      border: 1px solid rgba(255, 255, 255, .06);
      border-radius: 28px;
      padding: 44px 52px;
      overflow-y: auto;
      scrollbar-width: none;
    }

    .slide::-webkit-scrollbar {
      display: none;
    }

    .sn {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .13em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, .18);
      margin-bottom: 22px;
    }

    .ab {
      position: absolute;
      bottom: 0;
      left: 52px;
      right: 52px;
      height: 3px;
      border-radius: 3px;
    }

    /* Nav */
    .nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 1060px;
      margin: 0 auto;
      z-index: 100;
    }

    .nav button {
      background: rgba(255, 255, 255, .07);
      border: 1px solid rgba(255, 255, 255, .1);
      font: 600 13px/1 'Inter', sans-serif;
      padding: 9px 18px;
      border-radius: 100px;
      cursor: pointer;
      color: rgba(255, 255, 255, .6);
      transition: all .18s;
    }

    .nav button:hover:not(:disabled) {
      background: rgba(255, 255, 255, .13);
      color: #fff;
    }

    .nav button:disabled {
      opacity: .2;
      cursor: default;
    }

    .dots {
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .dot {
      height: 5px;
      border-radius: 5px;
      cursor: pointer;
      transition: all .3s cubic-bezier(.34, 1.56, .64, 1);
      border: none;
    }

    /* Shared content helpers */
    .card {
      background: rgba(255, 255, 255, .04);
      border: 1px solid rgba(255, 255, 255, .07);
      border-radius: 16px;
      padding: 20px 22px;
    }

    .g2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .g3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 14px;
    }
  </style>
</head>

<body>
  <div class="deck">
    <div class="slide" id="slide"></div>
  </div>
  <nav class="nav">
    <button id="prev" onclick="go(-1)">← Back</button>
    <div class="dots" id="dots"></div>
    <button id="next" onclick="go(1)">Next →</button>
  </nav>

  <script>
    const C = { pink: '#E5007D', cyan: '#00AEEF', green: '#8DC63F', orange: '#F7941D', red: '#ED1C24', purple: '#662D91' };

    const LOGO = `<svg viewBox="0 0 77 65" width="108" height="90" fill="none">

        <path d="M3 46L33 38L3 30L0 38L3 46Z" fill="#00AEEF"/>
        <path d="M3.59808 27.3555L33.5788 35.4273L11.5981 13.4991L5 18.9273L3.59808 27.3555Z" fill="#8DC63F"/>
        <path d="M13.5 11.5981L35.4282 33.5788L27.3564 3.59808L18.9282 5L13.5 11.5981Z" fill="#FFF200"/>

        <path d="M56.66 64.35C55.3 64.35 54.05 64 52.91 63.3C51.78 62.58 50.87 61.63 50.19 60.45C49.52 59.25 49.19 57.93 49.19 56.5C49.19 55.07 49.52 53.76 50.19 52.57C50.87 51.37 51.78 50.42 52.91 49.72C54.05 49.01 55.3 48.65 56.66 48.65C57.65 48.65 58.55 48.82 59.39 49.17C60.22 49.52 60.93 50.02 61.51 50.65V49H64.94V64H61.51V62.35C60.93 62.97 60.22 63.46 59.39 63.82C58.55 64.17 57.65 64.35 56.66 64.35Z"/>
      </g>
    </svg>`;

    function badge(text, bg, border) {
      return `<span style="padding:5px 13px;background:${bg || 'rgba(255,255,255,.06)'};border:1px solid ${border || 'rgba(255,255,255,.1)'};border-radius:100px;font-size:13px;font-weight:600;color:rgba(255,255,255,.7);white-space:nowrap">${text}</span>`;
    }

    function card(icon, title, body, color) {
      return `<div class="card" style="border-color:rgba(255,255,255,.07)">
        <div style="font-size:22px;margin-bottom:8px">${icon}</div>
        <div style="font-size:15px;font-weight:700;color:${color || '#fff'};margin-bottom:5px">${title}</div>
        <div style="font-size:13.5px;color:rgba(255,255,255,.5);line-height:1.6">${body}</div>
      </div>`;
    }

    const slides = [
      /* 0 — Title */
      {
        c: 'pink', render: (i, n) => `
        <p class="sn">${i + 1} / ${n}</p>
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:calc(100% - 44px);text-align:center">

        </div>
        <div class="ab" style="background:linear-gradient(90deg,#E5007D,#662D91)"></div>

      /* 1 — Problem */
      {

        <p class="sn">${i + 1} / ${n}</p>

        <div class="g3">
          ${card('👻', 'show up, vanish', 'you attend, get a checkmark, then disappear. no trace of engagement left behind.', C.red)}

          ${card('📉', 'zero accountability', 'hosts can\'t tell who\'s engaged. members drift. communities hollow out.', C.red)}
        </div>
        <div class="ab" style="background:${C.red}"></div>
      ` },

      /* 2 — Solution */
      {
        c: 'cyan', render: (i, n) => `

        <div class="ab" style="background:${C.cyan}"></div>

      /* 3 — How It Works */

              <div style="font-size:14px;font-weight:700;color:#fff;margin-bottom:4px">${s}</div>
              <div style="font-size:12px;color:rgba(255,255,255,.4);line-height:1.5;padding:0 4px">${d}</div>
            </div>

        </div>
        <div class="ab" style="background:${C.green}"></div>

      /* 4 — QR Matching */
      {
        c: 'orange', render: (i, n) => `
        <p class="sn">${i + 1} / ${n}</p>
        <h1 style="font-size:44px;font-weight:900;letter-spacing:-.025em;color:${C.orange}">QR matching</h1>
        <p style="font-size:17px;color:rgba(255,255,255,.4);margin-top:6px;font-weight:500;margin-bottom:28px">from passive attendance to forced interaction</p>
        <div class="g2">
          <div class="card" style="border-color:rgba(237,28,36,.2);background:rgba(237,28,36,.06)">

            <div style="display:flex;flex-direction:column;gap:8px">

                <th style="padding:14px 20px;text-align:center;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.4)">free</th>

            ['attend events', '✓', '✓'],
            ['create meetups', '—', '✓'],
            ['monetize content', '—', '✓'],
            ['arweave permanent storage', '—', '✓'],

        c: 'green', render: (i, n) => `

          <span style="font-size:14px;font-weight:600;color:rgba(255,255,255,.7)">deployed and verified on <span style="color:${C.green}">Arbitrum Sepolia</span> — smart contracts live, reputation system active</span>

      /* 9 — Roadmap */
      {
        c: 'orange', render: (i, n) => `
        <p class="sn">${i + 1} / ${n}</p>
        <div style="display:flex;align-items:flex-start;gap:40px;height:calc(100% - 44px)">
          <div style="flex:1;min-width:0">
            <h1 style="font-size:44px;font-weight:900;letter-spacing:-.025em;color:${C.orange}">roadmap</h1>
            <p style="font-size:17px;color:rgba(255,255,255,.4);margin-top:6px;font-weight:500;margin-bottom:28px">where we're headed</p>
            <div style="display:flex;flex-direction:column;gap:10px">
              ${[
            ['MVP', 'current', '✓ live on testnet, QR system, reputation NFTs', 'green'],
            ['mainnet', 'TBD', 'deploy to Arbitrum mainnet, real value at stake', 'orange'],
            ['pro expansion', 'TBD', 'host monetization, Arweave storage, analytics', 'orange'],
            ['multi-chain', 'TBD', 'expand to Base, Optimism, Polygon', 'purple'],
            ['DAO governance', 'TBD', 'full community treasury, AI-proposed rewards', 'purple'],
          ].map(([phase, when, desc, col], idx) => `
                <div style="display:flex;align-items:center;gap:12px;padding:10px 14px;background:${idx === 0 ? 'rgba(141,198,63,.07)' : 'rgba(255,255,255,.025)'};border:1px solid ${idx === 0 ? 'rgba(141,198,63,.2)' : 'rgba(255,255,255,.06)'};border-radius:12px">
                  <div style="width:6px;height:6px;border-radius:50%;background:${C[col]};flex-shrink:0"></div>
                  <div style="flex:1;min-width:0">
                    <div style="display:flex;align-items:center;gap:8px;margin-bottom:2px">
                      <span style="font-size:13.5px;font-weight:700;color:${idx === 0 ? C.green : 'rgba(255,255,255,.8)'}">${phase}</span>
                      <span style="font-size:11px;font-weight:600;padding:2px 8px;background:${idx === 0 ? 'rgba(141,198,63,.15)' : 'rgba(255,255,255,.06)'};border-radius:100px;color:${idx === 0 ? C.green : 'rgba(255,255,255,.4)'}">${when}</span>
                    </div>
                    <div style="font-size:12px;color:rgba(255,255,255,.38)">${desc}</div>
                  </div>
                </div>
              `).join('')}
            </div>
        <div class="ab" style="background:${C.orange}"></div>
      ` },

      /* 10 — Closing */
      {
        c: 'pink', render: (i, n) => `
        <p class="sn">${i + 1} / ${n}</p>
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:calc(100% - 44px);text-align:center">
          <div style="margin-bottom:24px">${LOGO}</div>
          <h1 style="font-size:42px;font-weight:900;letter-spacing:-.025em;line-height:1.1;max-width:600px">
            real connections,<br>verified on-chain.
          </h1>
          <p style="font-size:18px;color:rgba(255,255,255,.45);margin-top:16px;font-weight:500;max-width:500px;line-height:1.6">
            we're building communities people actually show up for.
          </p>
          <div style="margin-top:36px;padding:16px 36px;background:linear-gradient(135deg,rgba(229,0,125,.15),rgba(102,45,145,.15));border:1px solid rgba(229,0,125,.3);border-radius:16px">
            <div style="font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:4px">Try it now</div>
            <div style="font-size:26px;font-weight:800;background:linear-gradient(135deg,#E5007D,#662D91);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">arka.social</div>
          </div>
        </div>
        <div class="ab" style="background:linear-gradient(90deg,#E5007D,#662D91)"></div>
      ` },
    ];

    let cur = 0;

    function render() {
      const s = slides[cur];
      const color = C[s.c] || C.pink;
      document.getElementById('slide').innerHTML = s.render(cur, slides.length);

      document.getElementById('prev').disabled = cur === 0;
      document.getElementById('next').disabled = cur === slides.length - 1;

      const dots = document.getElementById('dots');
      dots.innerHTML = slides.map((sd, i) => {
        const dc = C[sd.c] || C.pink;
        return `<button class="dot" onclick="jump(${i})" style="width:${i === cur ? 22 : 6}px;background:${i === cur ? dc : 'rgba(255,255,255,.18)'}"></button>`;
      }).join('');
    }

    function go(d) { cur = Math.max(0, Math.min(slides.length - 1, cur + d)); render(); }
    function jump(i) { cur = i; render(); }
    render();

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(1); }
      if (e.key === 'ArrowLeft') { e.preventDefault(); go(-1); }
    });

    document.addEventListener('wheel', e => {
      const slide = document.getElementById('slide');
      const atTop = slide.scrollTop === 0;
      const atBottom = slide.scrollTop + slide.clientHeight >= slide.scrollHeight - 1;
      if (e.deltaY < 0 && !atTop) return;
      if (e.deltaY > 0 && !atBottom) return;
      e.preventDefault();
      go(e.deltaY > 0 ? 1 : -1);
    }, { passive: false });
  </script>
</body>

</html>
